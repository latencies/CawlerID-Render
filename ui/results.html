<!DOCTYPE html>
<html>
<head>
    <title>Cawler ID Results</title>
</head>
<body>

    <h1>Bird Call Analysis Results</h1>

    <!-- Display the generated spectrogram -->
    <h2>Spectrogram</h2>
    <img src="{{ url_for('static', filename=spectrogram_image) }}" 
         alt="Spectrogram Image" width="600">

    <!-- Display ranked results -->
    <h2>Similarity Ranking</h2>
    <ul>
        {% for entry in results %}
            <li>
                #{{ entry.rank }} — {{ entry.bird }} (score: {{ entry.score }})
            </li>
        {% endfor %}
        
    </ul>
    <br><br>

    <!-- Link back to upload page -->
    <a href="/">Analyze another recording</a>

</body>
</html>
